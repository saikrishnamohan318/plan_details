<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <title>Frontend Mentor | Order summary card</title>
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="challenge1.css">
</head>
<body>
  <div class="total">
    <div class="body">
      <div class="boy-image">
        <img src="illustration-hero.svg" alt="image">
      </div>
      <h1>Order Summary</h1>
      <p class="about">You can now listen to millions of songs, audiobooks, and podcasts on any
      device anywhere you like!</p>
      <div class="plan-details">
        <img class="icon" src="icon-music.svg" alt="music-icon">
        <input class="radio" type="radio" name="plan" value="Annual Plan$59.99">Annual Plan $59.99 <br>
        <input class="radio" type="radio" name="plan" value="6-months Plan$25.5">6-months Plan $25.5 <br>
        <input class="radio" type="radio" name="plan" value="3-months Plan$13.5">3-months Plan $13.5 <br>
      </div>
      <p class="btn">Proceed to Payment</p><br>
      <p class="button">Cancel Order</p>

      <div class="attribution">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
        Coded by <a href="#">Kolla.Saikrishnamohan</a>.
      </div>
    </div>
  </div>


</body>
</html>
